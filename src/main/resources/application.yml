spring:
  application:
    name: remote-falcon-control-panel
  main:
    web-application-type: servlet
  data:
    mongodb:
      database: ${MONGO_DATABASE:remote-falcon}
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server:
  servlet:
    contextPath: /remote-falcon-control-panel
  port: 8080

info:
  build:
    artifact: remote-falcon-control-panel

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
      cors:
        allowed-origins: "*"
        allowed-methods: "OPTIONS, GET, POST, PUT, DELETE"
        allowed-headers: "*"

sendgrid:
  mail-from: "noreply@remotefalcon.com"

images:
  s3:
    bucket: ${IMAGES_S3_BUCKET:remote-falcon-images}
  cdn:
    endpoint: ${IMAGES_CDN_ENDPOINT:https://remote-falcon-images.nyc3.cdn.digitaloceanspaces.com}

logging:
  level:
    org:
      springframework:
        graphql: OFF #Turn off logging for Spring GraphQL

expo-push-url: https://exp.host/--/api/v2/push/send
